global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'omnivis-backend'
    metrics_path: '/api/metrics/live'
    scrape_interval: 5s
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'omnivis-backend'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
